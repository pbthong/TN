<script>
    // === CẤU HÌNH FIREBASE CỦA BẠN ===
    const FIREBASE_URL = 'https://tiengnga-4996e-default-rtdb.asia-southeast1.firebasedatabase.app';
    // =================================

    let words = [];
    let filtered = [];
    let currentIndex = 0;
    let score = 0;
    let currentQuizWord = "";

    // Tự động tải dữ liệu khi mở web
    window.onload = async () => {
        await loadRemoteData();
    };

    // 1. Hàm đọc dữ liệu từ Firebase
    async function loadRemoteData() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">🔄 Đang tải từ điển từ Google Firebase...</td></tr>';
        
        try {
            // Chúng ta thêm '.json' vào cuối link Firebase để gọi dữ liệu dạng API trực tiếp
            const response = await fetch(`${FIREBASE_URL}/vocabulary.json`);
            if (!response.ok) throw new Error('Lỗi kết nối Firebase');
            
            const data = await response.json();
            // Nếu Firebase mới tinh chưa có dữ liệu, gán mặc định là mảng rỗng []
            words = data || []; 
            
            updateGroups();
            renderTable();
        } catch (error) {
            alert('Lỗi tải dữ liệu! Hệ thống chuyển sang dùng dữ liệu dự phòng tại máy.');
            console.error(error);
            words = JSON.parse(localStorage.getItem('rusWords')) || [];
            updateGroups();
            renderTable();
        }
    }

    // 2. Hàm lưu dữ liệu đè lên Firebase
    async function save() {
        // Luôn lưu một bản dự phòng tại máy đang dùng cho an toàn
        localStorage.setItem('rusWords', JSON.stringify(words));
        updateGroups();
        renderTable();

        try {
            // Gửi đè toàn bộ mảng từ vựng mới lên nhánh 'vocabulary' trên Firebase
            const response = await fetch(`${FIREBASE_URL}/vocabulary.json`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(words)
            });
            if (!response.ok) throw new Error('Không thể đồng bộ lên Firebase');
            console.log('🎉 Đã đồng bộ thành công lên Firebase!');
        } catch (error) {
            alert('Lỗi: Dữ liệu đã lưu tạm ở máy nhưng chưa đẩy lên mạng được. Hãy kiểm tra kết nối.');
            console.error(error);
        }
    }

    // Hàm hỗ trợ tự động xử lý dấu sắc thành ký tự trọng âm tiếng Nga (\u0301)
    function convertToRussianAccent(text) {
        return text.replace(/([аеиоуыэюяаеиоуыэюя])'/gi, '$1\u0301');
    }

    // --- Core Functions ---
    function addWord() {
        let r = document.getElementById('rusInput').value.trim();
        const v = document.getElementById('vieInput').value.trim();
        const g = document.getElementById('groupInput').value.trim() || 'Chưa phân loại';
        
        if (r && v) {
            r = convertToRussianAccent(r); // Tự động đánh trọng âm nếu có dấu ' sau nguyên âm
            words.push({ rus: r, vie: v, group: g });
            save(); // Tự động đồng bộ lên Firebase
            document.getElementById('rusInput').value = '';
            document.getElementById('vieInput').value = '';
            document.getElementById('rusInput').focus();
        } else {
            alert("Vui lòng nhập đủ từ tiếng Nga và tiếng Việt!");
        }
    }

    function addBulk() {
        const text = document.getElementById('bulkInput').value;
        const g = document.getElementById('groupInput').value.trim() || 'Chưa phân loại';
        if (!text.trim()) return;

        const lines = text.split('\n');
        let count = 0;
        lines.forEach(line => {
            let p = line.split(/[-:\t]/);
            if (p.length >= 2) {
                let r = convertToRussianAccent(p[0].trim());
                words.push({ rus: r, vie: p[1].trim(), group: g });
                count++;
            }
        });
        if(count > 0) {
            save(); // Tự động đồng bộ lên Firebase
            document.getElementById('bulkInput').value = '';
            alert(`Đã thêm và đồng bộ thành công ${count} từ!`);
        }
    }

    function renderTable() {
        const b = document.getElementById('tableBody');
        b.innerHTML = '';
        if (words.length === 0) {
            b.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#999;">Chưa có từ vựng nào.</td></tr>';
            document.getElementById('wordCount').innerText = 0;
            return;
        }
        [...words].reverse().forEach((w, i) => {
            const idx = words.length - 1 - i;
            b.innerHTML += `<tr>
                <td><b>${w.rus}</b> <button onclick="speak('${w.rus}')" style="border:none; background:none; cursor:pointer;">🔊</button></td>
                <td>${w.vie}</td>
                <td><small style="background:#eee; padding:2px 5px; border-radius:4px">${w.group}</small></td>
                <td><button class="btn-delete" onclick="deleteWord(${idx})">Xóa</button></td>
            </tr>`;
        });
        document.getElementById('wordCount').innerText = words.length;
    }

    function deleteWord(i) {
        if(confirm('Xóa từ này?')) {
            words.splice(i, 1);
            save(); // Tự động đồng bộ xóa trên Firebase
        }
    }

    function clearAllData() {
        if(confirm('Cảnh báo: Xóa sạch toàn bộ từ vựng trên đám mây Firebase?')) {
            words = [];
            save(); // Tự động đồng bộ xóa sạch dữ liệu trên Firebase
        }
    }

    // --- Speech (Google TTS API) ---
    function speak(text) {
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=ru&client=tw-ob&q=${encodeURIComponent(text)}`;
        const audio = new Audio(url);
        audio.play().catch(error => console.error("Không thể phát âm thanh:", error));
    }
    function playCurrentWord() { if (filtered[currentIndex]) speak(filtered[currentIndex].rus); }
    function playQuizWord() { if (currentQuizWord) speak(currentQuizWord); }

    // --- Group Logic ---
    function updateGroups() {
        const groups = [...new Set(words.map(w => w.group || 'Chưa phân loại'))];
        const filter = document.getElementById('groupFilter');
        const suggest = document.getElementById('groupSuggestions');
        const curVal = filter.value;
        
        filter.innerHTML = '<option value="all">Tất cả từ vựng</option>';
        suggest.innerHTML = '';
        groups.forEach(g => {
            filter.innerHTML += `<option value="${g}">${g}</option>`;
            suggest.innerHTML += `<option value="${g}">`;
        });
        filter.value = curVal;
    }

    function handleGroupChange() {
        const activeSection = document.querySelector('.section.active').id;
        if (activeSection === 'flashcard') initFlashcard();
        if (activeSection === 'quiz') initQuiz();
    }

    // --- Learning Modes ---
    function initFlashcard() {
        const g = document.getElementById('groupFilter').value;
        filtered = g === 'all' ? [...words] : words.filter(w => w.group === g);
        
        if (filtered.length === 0) {
            document.getElementById('fc-main-area').style.display = 'none';
            document.getElementById('empty-msg').style.display = 'block';
        } else {
            document.getElementById('fc-main-area').style.display = 'block';
            document.getElementById('empty-msg').style.display = 'none';
            currentIndex = 0;
            showCard();
        }
    }

    function showCard() {
        const card = document.getElementById('activeCard');
        card.classList.remove('is-flipped');
        document.getElementById('fc-rus').innerText = filtered[currentIndex].rus;
        document.getElementById('fc-vie').innerText = filtered[currentIndex].vie;
        document.getElementById('fc-index').innerText = `${currentIndex + 1} / ${filtered.length}`;
    }

    function flipCard() { document.getElementById('activeCard').classList.toggle('is-flipped'); }
    function nextCard() { currentIndex = (currentIndex + 1) % filtered.length; showCard(); }
    function prevCard() { currentIndex = (currentIndex - 1 + filtered.length) % filtered.length; showCard(); }

    function initQuiz() {
        const g = document.getElementById('groupFilter').value;
        filtered = g === 'all' ? [...words] : words.filter(w => w.group === g);
        
        if (filtered.length < 4) {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('quiz-empty-msg').style.display = 'block';
        } else {
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('quiz-empty-msg').style.display = 'none';
            generateQuiz();
        }
    }

    function generateQuiz() {
        document.getElementById('quiz-feedback').innerText = '';
        const correct = filtered[Math.floor(Math.random() * filtered.length)];
        currentQuizWord = correct.rus;
        
        let opts = [correct];
        while (opts.length < 4) {
            let r = filtered[Math.floor(Math.random() * filtered.length)];
            if (!opts.some(o => o.vie === r.vie)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        document.getElementById('quiz-question').innerText = correct.rus;
        const container = document.getElementById('quiz-options');
        container.innerHTML = '';
        opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = o.vie;
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                if (o.vie === correct.vie) {
                    btn.classList.add('correct');
                    score += 10;
                } else {
                    btn.classList.add('wrong');
                    document.querySelectorAll('.option-btn').forEach(b => {
                        if(b.innerText === correct.vie) b.classList.add('correct');
                    });
                }
                document.getElementById('score').innerText = score;
            };
            container.appendChild(btn);
        });
    }

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if (id === 'flashcard') initFlashcard();
        if (id === 'quiz') initQuiz();
    }
</script>
